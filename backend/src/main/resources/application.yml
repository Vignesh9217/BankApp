spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:bankapp;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-dev-secret-key-for-bank-app-2026-with-extra-characters-for-hs512-security}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
