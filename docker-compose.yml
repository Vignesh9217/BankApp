services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
